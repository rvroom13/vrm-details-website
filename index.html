<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRM Details â Premium Mobile Auto Detailing | Miami, FL</title>
  <meta name="description" content="VRM Details is Miami's premier mobile auto detailing service. We come to you â exterior wash, interior detail, paint correction, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #D00000;
      --red-dark: #A00000;
      --red-glow: rgba(208, 0, 0, 0.35);
      --bg: #0A0A0A;
      --bg-card: #111111;
      --bg-card-hover: #1A1A1A;
      --white: #FFFFFF;
      --gray-100: #F0F0F0;
      --gray-300: #B0B0B0;
      --gray-500: #707070;
      --gray-700: #2A2A2A;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 70px;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--gray-100);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    ::selection {
      background: var(--red);
      color: var(--white);
    }

    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--red-glow); }
      50% { box-shadow: 0 0 20px 5px var(--red-glow); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 1.15rem;
      letter-spacing: 2px;
      padding: 14px 36px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn-primary {
      background: var(--red);
      color: var(--white);
      box-shadow: 0 4px 20px var(--red-glow);
    }

    .btn-primary:hover {
      background: var(--red-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 30px var(--red-glow);
    }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 2px solid var(--red);
    }

    .btn-outline:hover {
      background: var(--red);
      transform: translateY(-2px);
    }

    /* ===== SECTION HEADING ===== */
    .section-heading {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-heading h2 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 12px;
    }

    .section-heading .accent-line {
      width: 60px;
      height: 3px;
      background: var(--red);
      margin: 0 auto 20px;
    }

    .section-heading p {
      color: var(--gray-300);
      max-width: 600px;
      margin: 0 auto;
      font-size: 1.05rem;
      font-weight: 300;
    }

    section {
      padding: 100px 0;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 20px 0;
      transition: all 0.4s ease;
    }

    .navbar.scrolled {
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      padding: 12px 0;
      box-shadow: 0 2px 30px rgba(0, 0, 0, 0.5);
    }

    .navbar .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: var(--white);
      text-transform: uppercase;
    }

    .nav-logo span {
      color: var(--red);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray-300);
      transition: color 0.3s ease;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--red);
      transition: width 0.3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--white);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }

    .nav-cta {
      font-family: var(--font-display) !important;
      background: var(--red);
      color: var(--white) !important;
      padding: 8px 22px;
      border-radius: 3px;
      letter-spacing: 2px !important;
      font-size: 0.9rem !important;
      transition: all 0.3s ease !important;
    }

    .nav-cta::after { display: none !important; }

    .nav-cta:hover {
      background: var(--red-dark) !important;
      color: var(--white) !important;
    }

    /* Mobile menu toggle */
    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 5px;
      z-index: 1001;
    }

    .menu-toggle span {
      display: block;
      width: 28px;
      height: 2px;
      background: var(--white);
      transition: all 0.3s ease;
      transform-origin: center;
    }

    .menu-toggle.open span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .menu-toggle.open span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.open span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(208, 0, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(208, 0, 0, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at center, rgba(10, 10, 10, 0) 0%, var(--bg) 70%);
      z-index: 1;
    }

    /* Animated grid lines */
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(208, 0, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(208, 0, 0, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      animation: fadeUp 1s ease forwards;
    }

    .hero-badge {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid rgba(208, 0, 0, 0.3);
      padding: 8px 20px;
      margin-bottom: 30px;
      animation: fadeIn 1s ease 0.3s both;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 9rem);
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--white);
      line-height: 0.95;
      margin-bottom: 8px;
    }

    .hero h1 span {
      display: block;
      color: var(--red);
      font-size: 0.45em;
      letter-spacing: 12px;
    }

    .hero-tagline {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--gray-300);
      font-weight: 300;
      margin-bottom: 40px;
      letter-spacing: 1px;
      animation: fadeIn 1s ease 0.5s both;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeIn 1s ease 0.7s both;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: fadeIn 1s ease 1.2s both;
    }

    .scroll-indicator span {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray-500);
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--red), transparent);
      animation: pulse 2s ease infinite;
    }

    /* ===== ABOUT ===== */
    #about {
      background: linear-gradient(180deg, var(--bg) 0%, #0D0D0D 100%);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .about-visual {
      position: relative;
      height: 400px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--gray-700);
    }

    .about-visual-inner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 50%, rgba(208, 0, 0, 0.1) 0%, transparent 50%),
        linear-gradient(135deg, #0F0F0F, #1A1A1A);
    }

    .about-visual-text {
      font-family: var(--font-display);
      font-size: 6rem;
      letter-spacing: 6px;
      color: rgba(208, 0, 0, 0.12);
      text-transform: uppercase;
      user-select: none;
    }

    .about-stats {
      display: flex;
      gap: 30px;
      margin-top: 30px;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-family: var(--font-display);
      font-size: 2.5rem;
      color: var(--red);
      letter-spacing: 2px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .about-text h3 {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .about-text h3 span {
      color: var(--red);
    }

    .about-text p {
      color: var(--gray-300);
      font-weight: 300;
      margin-bottom: 16px;
      line-height: 1.8;
    }

    /* ===== SERVICES ===== */
    #services {
      background: #0D0D0D;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--gray-700);
      border-radius: 8px;
      padding: 36px 28px;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--red);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .service-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(208, 0, 0, 0.3);
      transform: translateY(-4px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: rgba(208, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .service-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--red);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .service-card h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--white);
    }

    .service-card .service-subtitle {
      color: var(--gray-500);
      font-size: 0.85rem;
      font-weight: 300;
      margin-bottom: 18px;
    }

    .pricing-table {
      margin-bottom: 20px;
    }

    .pricing-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .pricing-row:last-child {
      border-bottom: none;
    }

    .pricing-row .vehicle-type {
      color: var(--gray-300);
      font-size: 0.9rem;
      font-weight: 300;
    }

    .pricing-row .vehicle-price {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--red);
      letter-spacing: 1px;
    }

    .service-card p {
      color: var(--gray-300);
      font-weight: 300;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .service-section-label {
      font-family: var(--font-display);
      font-size: 0.8rem;
      letter-spacing: 3px;
      color: var(--red);
      text-align: center;
      margin: 18px 0 10px;
      text-transform: uppercase;
    }

    .service-includes {
      margin-top: 0;
      padding-top: 0;
    }

    .service-includes li {
      color: var(--gray-300);
      font-size: 0.85rem;
      font-weight: 300;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .service-includes li::before {
      content: '';
      width: 5px;
      height: 5px;
      background: var(--red);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Popular badge */
    .service-card.popular {
      border-color: rgba(208, 0, 0, 0.4);
    }

    .popular-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--red);
      color: var(--white);
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    /* Monthly badge */
    .monthly-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #C82960E;
      color: var(--white);
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 2px;
      padding: 4px 12px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .service-card.monthly {
      border-color: rgba(200, 150, 14, 0.4);
    }

    .service-card.monthly::before {
      background: #C82960E;
    }

    .service-note {
      margin-top: 16px;
      padding: 12px;
      background: rgba(200, 150, 14, 0.06);
      border: 1px solid rgba(200, 150, 14, 0.15);
      border-radius: 4px;
      color: var(--gray-300);
      font-size: 0.8rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.6;
    }

    /* Add-ons bar */
    .addons-bar {
      margin-top: 40px;
      background: var(--bg-card);
      border: 1px solid var(--gray-700);
      border-radius: 8px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px 32px;
    }

    .addons-bar h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white);
      margin-right: 8px;
    }

    .addon-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1px solid var(--gray-700);
      border-radius: 4px;
      font-size: 0.9rem;
      color: var(--gray-300);
      font-weight: 300;
    }

    .addon-chip .addon-price {
      font-family: var(--font-display);
      color: var(--red);
      font-size: 1rem;
      letter-spacing: 1px;
    }

    /* ===== WHRCHOOSE US ===== */
    #why {
      background: var(--bg);
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    .feature {
      text-align: center;
      padding: 40px 20px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.4s ease;
    }

    .feature:hover {
      border-color: var(--gray-700);
      background: var(--bg-card);
    }

    function initMultiSelect(container) {
      const trigger = container.querySelector('.multi-select-trigger');
      const dropdown = container.querySelector('.multi-select-dropdown');
      const optionEls = container.querySelectorAll('.multi-select-option');
      const selected = new Set();

      function renderTags() {
        // Remove existing tags
        trigger.querySelectorAll('.multi-select-tag').forEach(t => t.remove());
        const placeholder = trigger.querySelector('.placeholder');

        if (selected.size === 0) {
          if (!placeholder) {
            const ph = document.createElement('span');
            ph.className = 'placeholder';
            ph.textContent = 'Select add-ons...';
            trigger.appendChild(ph);
          }
        } else {
          if (placeholder) placeholder.remove();
          selected.forEach(val => {
            const tag = document.createElement('span');
            tag.className = 'multi-select-tag';
            const shortName = val.split(' (+')[0];
            tag.innerHTML = shortName + ' <span class="remove-tag">&times;</span>';
            tag.querySelector('.remove-tag').addEventListener('click', (e) => {
              e.stopPropagation();
              selected.delete(val);
              optionEls.forEach(o => {
                if (o.dataset.value === val) o.classList.remove('selected');
              });
              renderTags();
            });
            trigger.insertBefore(tag, trigger.lastElementChild);
          });
        }
      }

      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.search-select.open, .multi-select.open').forEach(el => {
          if (el !== container) el.classList.remove('open');
        });
        container.classList.toggle('open');
      });

      optionEls.forEach(opt => {
        opt.addEventListener('click', (e) => {
          e.stopPropagation();
          const val = opt.dataset.value;
          if (selected.has(val)) {
            selected.delete(val);
            opt.classList.remove('selected');
          } else {
            selected.add(val);
            opt.classList.add('selected');
          }
          renderTags();
        });
      });

      return { getSelected: () => [...selected] };
    }
